version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: submify-db
    environment:
      POSTGRES_USER: submify
      POSTGRES_PASSWORD: submify
      POSTGRES_DB: submify
    volumes:
      - /var/lib/submify/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U submify"]
      interval: 10s
      timeout: 5s
      retries: 10

  rustfs:
    image: ${RUSTFS_IMAGE:-minio/minio:latest}
    container_name: submify-rustfs
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${RUSTFS_ROOT_USER:-submify}
      MINIO_ROOT_PASSWORD: ${RUSTFS_ROOT_PASSWORD:-submify123}
    volumes:
      - /var/lib/submify/data/rustfs:/data

  api:
    build:
      context: ./apps/api
    container_name: submify-api
    environment:
      PORT: 8080
      DATABASE_URL: postgres://submify:submify@db:5432/submify?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:2512}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GITHUB_REPO: ${GITHUB_REPO:-nodedr/submify}
      UPDATE_CHECK_MINUTES: ${UPDATE_CHECK_MINUTES:-360}
      ALLOW_UPDATE_TRIGGER: ${ALLOW_UPDATE_TRIGGER:-false}
      UPDATE_COMMAND: "${UPDATE_COMMAND:-docker compose pull && docker compose up -d}"
      UPLOAD_MAX_SIZE_BYTES: ${UPLOAD_MAX_SIZE_BYTES:-26214400}
      UPLOAD_ALLOWED_MIME: ${UPLOAD_ALLOWED_MIME:-image/png,image/jpeg,application/pdf,text/plain}
      PRESIGN_EXPIRY_MINUTES: ${PRESIGN_EXPIRY_MINUTES:-10}
    depends_on:
      db:
        condition: service_healthy
      rustfs:
        condition: service_started

  web:
    build:
      context: ./apps/web
    container_name: submify-web
    environment:
      NEXT_PUBLIC_API_BASE: /api/v1
    depends_on:
      api:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: submify-nginx
    ports:
      - "2512:2512"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: submify-cloudflared
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      nginx:
        condition: service_started
    profiles:
      - tunnel

