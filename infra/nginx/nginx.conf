worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile        on;
  keepalive_timeout 65;

  # Docker Compose DNS — re-resolve api/web after container restarts (avoids stale IP → 502).
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 2512;
    server_name _;

    client_max_body_size 30M;

    # Next.js Nodedr contact proxy (see apps/web/app/api/contact-submit); must be before /api/ → Go
    location /api/contact-submit {
      set $upstream_web http://web:3000;
      proxy_pass $upstream_web;
      proxy_http_version 1.1;
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }

    location /api/ {
      set $upstream_api http://api:8080;
      proxy_pass $upstream_api;
      proxy_http_version 1.1;
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # So the API can match browser Origin to the public hostname (Cloudflare Tunnel / CasaOS-style single URL).
      proxy_set_header X-Forwarded-Host $host;
    }

    location / {
      set $upstream_web http://web:3000;
      proxy_pass $upstream_web;
      proxy_http_version 1.1;
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
